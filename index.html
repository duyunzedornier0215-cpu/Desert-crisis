<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desert Crisis Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0e68c;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #8b4513;
        }
        .game-area {
            border: 2px solid #8b4513;
            padding: 10px;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
        }
    </style>
</head>
<body>
    <h1>Welcome to Desert Crisis Game</h1>
    <div class="game-area" id="gameArea">
        <p>Game starts here...</p>
    </div>
    <script>
        // Example JavaScript for interactive scenes
        const gameArea = document.getElementById('gameArea');
        gameArea.innerHTML = '<p>The game is loading...</p>';
        setTimeout(() => {
            gameArea.innerHTML = '<p>Game loaded! Enjoy your adventure!</p>';
        }, 2000);
    </script>
</body>
</html>
